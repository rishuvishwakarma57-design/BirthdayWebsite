<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Satoshi:wght@400;700&display=swap');
        
        body { font-family: 'Satoshi', sans-serif; background: #0c0a09; color: #f3f4f6; overflow: hidden; margin: 0; }
        
        /* Animated Aurora Background */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 20% 30%, hsla(333,70%,55%,.4), transparent),
                        radial-gradient(circle at 80% 20%, hsla(282,82%,54%,.3), transparent),
                        radial-gradient(circle at 50% 80%, hsla(210,89%,60%,.3), transparent),
                        radial-gradient(circle at 10% 90%, hsla(35,90%,60%,.3), transparent);
            filter: blur(80px);
            animation: aurora 20s infinite alternate ease-in-out;
        }

        @keyframes aurora { 0% { transform: scale(1); } 100% { transform: scale(1.3); } }

        .glass { background: rgba(17, 17, 17, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .text-gradient { background: linear-gradient(to right, #fda4af, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .step { display: none; width: 100%; }
        .active { display: block; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="aurora-bg"></div>
    <div id="canvas-container"></div>

    <main id="app" class="glass p-10 md:p-20 rounded-3xl max-w-4xl w-full text-center shadow-2xl z-10 transition-all duration-700">
        <!-- Content injected here -->
    </main>

    <script>
        const steps =[
            { id: 1, icon: '😸', title: 'Hey Dakait the Beautiful,', text: 'I built a little present for you, just to bring a smile to your face on your special day. I hope you enjoy this little journey!', btn: 'Let\'s Begin' },
            { id: 2, icon: '🎉', title: 'Happy Birthday!', text: 'Although I don\'t know much about you yet, I have noticed that you are a very charismatic person who brings a genuine smile to the lives of others. You have a wonderful sense of humor and a vibrant energy. I am really looking forward to discovering all the amazing things that make you who you are.', btn: 'There\'s more...' },
            { id: 3, type: 'bento', title: 'Things I Adore', content:[
                { title: '✨ Your Kindness', text: 'The genuine warmth you show to everyone around you is something truly rare and beautiful.' },
                { title: '😊 That Smile', text: 'It is a work of art that lights up any conversation.' },
                { title: '🌟 Future', text: 'I have just met you, so I don\'t know much yet, but I can bet that on your next birthday, I will have a much longer list of things I adore about you.' }
            ], btn: 'Photos??' },
            { id: 4, title: 'Our Memory', text: 'Every moment with you in chat feels like a scene from a humorous, heartwarming movie I would watch on repeat.', polaroid: true, btn: 'One last thing...' },
            { id: 5, icon: '🎂', title: 'My Wish For You', text: 'May this next year bring you all the love, success, and pure happiness you so rightfully deserve. May your dreams soar higher than ever, and may you always keep being your wonderful self.', btn: 'Celebrate!' }
        ];

        let currentStep = 0;
        const app = document.getElementById('app');

        function renderStep() {
            const s = steps[currentStep];
            let html = `<div class="step active animate-in fade-in zoom-in duration-700">`;
            if (s.icon) html += `<div class="text-7xl mb-8">${s.icon}</div>`;
            html += `<h2 class="text-4xl md:text-6xl font-bold mb-10 text-gradient leading-tight">${s.title}</h2>`;
            
            if (s.type === 'bento') {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-8 my-10">` + s.content.map(c => `<div class="glass p-8 rounded-2xl text-left border border-white/10"><h3 class="text-xl font-bold text-pink-300 mb-3">${c.title}</h3><p class="text-lg text-gray-200 leading-relaxed">${c.text}</p></div>`).join('') + `</div>`;
            } else if (s.polaroid) {
                html += `<div class="glass p-6 my-10 inline-block shadow-2xl border-white/20 transform rotate-[-2deg]">
                            <div class="w-full h-48 bg-gray-900 flex items-center justify-center text-gray-400 mb-6 rounded-lg text-lg px-4 text-center">Sorry I don't have the images of yours, putting aside THOSE stickers 😂</div>
                            <p class="font-serif italic text-lg">"Our favorite memory."</p>
                         </div>
                         <p class="text-xl md:text-2xl mb-10 text-gray-200 leading-relaxed">${s.text}</p>`;
            } else {
                html += `<p class="text-xl md:text-2xl mb-12 text-gray-200 leading-relaxed max-w-2xl mx-auto">${s.text}</p>`;
            }

            html += `<button onclick="nextStep()" class="bg-gradient-to-r from-pink-500 to-red-500 px-12 py-5 rounded-full font-bold text-xl hover:scale-105 transition-all shadow-lg shadow-pink-500/30">${s.btn}</button>
                    </div>`;
            app.innerHTML = html;
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                renderStep();
            } else {
                // Final Message
                app.innerHTML = `<h2 class="text-5xl md:text-7xl font-bold text-white mb-8">Happy Birthday, my new Friend! ❤️</h2>`;
                confetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
            }
        }

        // 3D Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);
        const emojis =['❤️', '🐱', '✨', '🐾', '💖'];
        
        emojis.forEach((em) => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.font = '80px Arial';
            ctx.fillText(em, 20, 90);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture });
            for(let i=0; i<8; i++) {
                const s = new THREE.Sprite(mat);
                s.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*20);
                s.scale.set(2.5, 2.5, 1);
                group.add(s);
            }
        });

        camera.position.z = 20;
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.003;
            group.children.forEach(s => s.position.y += Math.sin(Date.now() * 0.001) * 0.02);
            renderer.render(scene, camera);
        }
        animate();
        renderStep();
    </script>
</body>
</html>
